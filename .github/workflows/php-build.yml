name: build

on:
  push:
    branches: [ 'master', 'feature/*' ]
  pull_request:
    branches: [ 'master' ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [ '8.2', '8.3', '8.4', '8.5' ]

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict --no-interaction

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-oci8

      - name: Run unit tests
        run: php vendor/bin/phpunit --testsuite "Unit Tests" --color=always --display-deprecations --display-errors --display-warnings --no-coverage

  integration:
    name: Integration Tests (Oracle)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          APP_USER: ${{ secrets.ORACLE_USERNAME }}
          APP_USER_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP with oci8
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: oci8
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate connection config
        env:
          ORACLE_USERNAME: ${{ secrets.ORACLE_USERNAME }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        run: |
          php -r "
            file_put_contents('tests/integration/config-connection.php',
              \"<?php\ndefine('USERNAME', '\" . getenv('ORACLE_USERNAME') . \"');\ndefine('PASSWORD', '\" . getenv('ORACLE_PASSWORD') . \"');\ndefine('SCHEMA', 'localhost:1521/FREEPDB1');\n\"
            );
          "

      - name: Setup tables
        run: composer setup-tables

      - name: Run all tests with coverage
        run: composer test-coverage

      - name: Publish coveralls report
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          composer global require php-coveralls/php-coveralls
          php-coveralls -v
